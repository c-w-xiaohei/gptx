version: 2

project_name: gptx

before:
  hooks:
    - go mod tidy

builds:
  - id: gptx
    main: ./cmd/gptx
    binary: gptx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/c-w-xiaohei/gptx/internal/cli.Version={{ .Version }}

archives:
  - id: gptx
    ids:
      - gptx
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: c-w-xiaohei
    name: gptx
